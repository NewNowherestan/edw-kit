# ~/.config/tmux/dynamic_layout.conf
# Add to ~/.tmux.conf:
#   source-file ~/.config/tmux/dynamic_layout.conf

# ── custom commands (C-a : prompt, tab-completable) ──────────────────────────
set -g command-alias[10] dynlayout-open='run-shell "~/.config/tmux/dynopen.sh"'
set -g command-alias[11] dynlayout-reinit='run-shell "~/.config/tmux/autolayout.sh init"'
set -g command-alias[12] dynlayout-trigger='run-shell "~/.config/tmux/autolayout.sh"'

# ── keybinds ──────────────────────────────────────────────────────────────────
#bind-key W   dynlayout-open     # C-a W — open/create dynamic window
#bind-key M-r dynlayout-reinit   # C-a M-r — rebuild panes from scratch
#bind-key M-t dynlayout-trigger  # C-a M-t — force layout recalc

# ── pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# ── resize hooks ──────────────────────────────────────────────────────────────
set-hook -t main client-resized 'run-shell "~/.config/tmux/autolayout.sh"'
#set-hook -g client-resized 'run-shell "sleep 0.1 && /bin/bash ~/.config/tmux/autolayout.sh"
