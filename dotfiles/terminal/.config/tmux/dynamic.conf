# =============================================================================
# DYNAMIC LAYOUT — add to the bottom of ~/.tmux.conf
#
# This block manages the "dynamic" window in the "main" session.
# The autolayout.sh script handles pane creation, stashing, and recalling
# based on terminal dimensions. Panes are never killed — only moved.
#
# Panes:
#   dyndef-L   always visible (left anchor)
#   dyndef-R   always visible (right of L)
#   dyndef-H   visible on fullscreen only (full-width bottom)
#   dynwide-LL visible on widescreen only (far left col)
#
# Layouts triggered by terminal size:
#   Layout 1 — quick/narrow (<160 cols)        : L | R
#   Layout 2 — three panes  (≥160 cols)        : L | R | LL
#   Layout 3 — fullscreen   (≥50 rows)         : L (top) / H (bottom)
#   Layout 4 — wide+full    (≥220 cols, ≥50r)  : LL | L | R (top) / H (bottom)
# =============================================================================

# Show pane titles in borders (requires tmux ≥2.6)
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# Auto-apply layout whenever the terminal is resized
# (fires on fullscreen toggle, monitor plug/unplug, window resize)
set-hook -g client-resized 'run-shell "~/.config/tmux/autolayout.sh auto"'

# Manual layout re-apply: C-a M-l
bind M-l run-shell "~/.config/tmux/autolayout.sh manual"

# Create/jump to the dynamic window: C-a D
# If it exists, switch to it. If not, create it and let init_panes do the rest.
bind D run-shell '\
    tmux select-window -t dynamic 2>/dev/null || \
    ( tmux new-window -n dynamic && \
      sleep 0.2 && \
      ~/.config/tmux/autolayout.sh init )'