# ~/.config/tmux/dynamic_layout.conf
# Add to ~/.tmux.conf:  source-file ~/.config/tmux/dynamic_layout.conf

# Show pane titles in top border
set -g pane-border-status top
set -g pane-border-format " #{pane_title} #{pane_current_command} "

# Re-apply layout on resize
set-hook -g client-resized 'run-shell "~/.config/tmux/autolayout.sh auto"'

# C-a D  — jump to / create dynamic window
bind D run-shell '\
    tmux select-window -t main:dynamic 2>/dev/null || \
    ( tmux new-window -t main -n dynamic && sleep 0.3 && \
      ~/.config/tmux/autolayout.sh init )' \; \
    select-window -t main:dynamic

# C-a M-l  — force re-apply layout
bind M-l run-shell "~/.config/tmux/autolayout.sh auto"

# C-a M-i  — re-init panes (if one was killed)
bind M-i run-shell "~/.config/tmux/autolayout.sh init"
