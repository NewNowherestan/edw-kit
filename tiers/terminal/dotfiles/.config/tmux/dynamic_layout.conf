# ~/.config/tmux/dynamic_layout.conf
# Source from ~/.tmux.conf:
#   source-file ~/.config/tmux/dynamic_layout.conf

# Required for resize/focus events to reach tmux
set -g focus-events on

# Always resize window to the most-recently-attached client
set -g window-size latest

# Pane border titles
set -g allow-rename off
set -g automatic-rename off
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "
# Resize hook — passes session + window name into the script
set-hook -g window-resized 'run-shell "$HOME/.config/tmux/autolayout.sh #{session_name} #{window_name}"'

# Commands (prefix + : , tab-completable)
set -g command-alias[10] dynlayout-open='run-shell "$HOME/.config/tmux/dynopen.sh"'
set -g command-alias[11] dynlayout-reinit='run-shell "$HOME/.config/tmux/autolayout.sh #{session_name} dynamic reinit"'
set -g command-alias[12] dynlayout-trigger='run-shell "$HOME/.config/tmux/autolayout.sh #{session_name} #{window_name}"'

# Keybinds (uncomment to enable)
# bind-key W   dynlayout-open
# bind-key M-r dynlayout-reinit
# bind-key M-t dynlayout-trigger
